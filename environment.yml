name: fraud-fl-dp
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0
  - pytorch-cuda=11.8   # drop this line on CPU-only machines
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - pyyaml>=6.0
  - pyarrow>=13.0
  - statsmodels>=0.14
  - tqdm
  - pip:
    - ctgan==0.12.0
    - opacus==1.5.4
